name: Integration Tests STU3

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
  pull_request:

jobs:
  build:
    if: github.repository == 'FirelyTeam/spark'

    runs-on: ubuntu-24.04
    env:
      SPARK_IMAGE: sparkfhir/spark:stu3-latest
      MONGO_IMAGE: sparkfhir/mongo:stu3-latest

    steps:
      -
        name: Checkout repo
        uses: actions/checkout@v6
      - 
        name: Build the latest Spark Docker image
        run: docker build . --file .docker/linux/Spark.STU3.Dockerfile
          -t sparkfhir/spark:stu3-latest
      - 
        name: Build the latest Mongo Docker image
        run: docker build . --file .docker/linux/Mongo.STU3.Dockerfile
          -t sparkfhir/mongo:stu3-latest
      - 
        name: Run integration tests
        run: |
          cd Tests/IntegrationTests
          mkdir -p logs html_summaries json_results
          docker compose up -d spark
          docker compose run --rm --no-deps plan_executor ./execute_all.sh 'http://spark:8080/fhir' stu3 'html|json|stdout'
          docker compose logs spark > logs/backend.log
      - 
        name: Combine test results
        if: ${{ always() }}
        run: cd Tests/IntegrationTests && ./combine-test-results.sh json_results annotations.json .github/workflows/integration_tests_stu3.yml
      - 
        name: Attach test results
        if: github.event_name != 'pull_request'
        uses: yuzutech/annotations-action@v0.6.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          input: Tests/IntegrationTests/annotations.json
      - 
        name: Archive logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: logs-stu3-${{ github.sha }}
          path: Tests/IntegrationTests/logs/*.log*
      - 
        name: Archive test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: html_summaries-stu3-${{ github.sha }}
          path: Tests/IntegrationTests/html_summaries/**/*.html
      - 
        name: Archive JSON results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: json_results-stu3-${{ github.sha }}
          path: Tests/IntegrationTests/json_results/**/*.json
      - 
        name: Archive annotations file
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: annotations-stu3-${{ github.sha }}
          path: Tests/IntegrationTests/annotations.json
      - 
        name: Cleanup
        if: ${{ always() }}
        run: cd Tests/IntegrationTests && docker compose down
