name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches:
      - 'r4/master'
  pull_request:

env:
  DOCKERHUB_ORG: ${{ secrets.DOCKERHUB_ORGANIZATION }}

jobs:
  build:
    if: github.repository == 'FirelyTeam/spark'

    runs-on: ubuntu-24.04
    steps:
      -
        name: Checkout repo
        uses: actions/checkout@v6
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Spark Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/linux/Spark.Dockerfile
          load: true
          tags: ${{ env.DOCKERHUB_ORG }}/spark:r4-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Mongo Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/linux/Mongo.Dockerfile
          load: true
          tags: ${{ env.DOCKERHUB_ORG }}/mongo:r4-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - 
        name: Run integration tests
        run: |
          cd tests/integration-tests
          mkdir -p logs html_summaries json_results
          docker compose up -d spark
          docker compose run --rm --no-deps plan_executor ./execute_all.sh 'http://spark:8080/fhir' r4 'html|json|stdout'
          docker compose logs spark > logs/backend.log
      - 
        name: Combine test results
        if: ${{ always() }}
        run: cd tests/integration-tests && ./combine-test-results.sh json_results annotations.json
      - 
        name: Attach test results
        if: github.event_name != 'pull_request'
        uses: yuzutech/annotations-action@v0.5.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          input: tests/integration-tests/annotations.json
      - 
        name: Archive logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: logs-r4-${{ github.sha }}
          path: tests/integration-tests/logs/*.log*
      - 
        name: Archive test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: html_summaries-r4-${{ github.sha }}
          path: tests/integration-tests/html_summaries/**/*.html
      - 
        name: Archive JSON results
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: json_results-r4-${{ github.sha }}
          path: tests/integration-tests/json_results/**/*.json
      - 
        name: Archive annotations file
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: annotations-r4-${{ github.sha }}
          path: tests/integration-tests/annotations.json
      - 
        name: Cleanup
        if: ${{ always() }}
        run: cd tests/integration-tests && docker compose down

      # Push images after successful tests
      - name: Login to DockerHub
        if: success() && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Set image tags
        if: success()
        id: tags
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/r4/master" ]]; then
            echo "spark_tags=${{ env.DOCKERHUB_ORG }}/spark:canary" >> $GITHUB_OUTPUT
            echo "mongo_tags=${{ env.DOCKERHUB_ORG }}/mongo:canary" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
          else
            echo "push=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Push Spark image (multi-arch)
        if: success() && steps.tags.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/linux/Spark.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.spark_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Push Mongo image (multi-arch)
        if: success() && steps.tags.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/linux/Mongo.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.mongo_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
