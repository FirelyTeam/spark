version: 2
updates:
  - package-ecosystem: nuget
    directories:
      - /Applications/
      - /Tests
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps:"
  - package-ecosystem: npm
    directories:
      - "/Applications/Spark.Web.R4/app/"
      - "/Applications/Spark.Web.STU3/app/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps:"
  - package-ecosystem: docker
    directory: "/.docker/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "docker:"
  - package-ecosystem: github-actions
    directory: "/.github/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci:"
